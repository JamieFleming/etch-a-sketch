<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Etch A Sketch</title>
</head>
<body>
    <header>
        <h1>Etch-a-Sketch</h1>

        <div id="form" class="form">
            <p>New Grid Size:</p><input type="text" id="user-number" class="user-number">
            <p id="copy-input"></p>
            <button id="user-submit" class="user-submit">Submit</button>
        </div>
        <p id="prompt"></p>

        <div id="buttons">
            <form id="button-container">
                <input type="radio" id="black-pen" value="black-pen"><label for="black-pen">Black</label>
                <input type="radio" id="red-pen" value="red-pen"><label for="red-pen">Red</label>
                <input type="radio" id="blue-pen" value="blue-pen"><label for="blue-pen">Blue</label>
                <input type="radio" id="rainbow" value="rainbow"><label for="rainbow">Rainbow</label>
                <input type="radio" id="eraser" value="eraser"><label for="eraser">Eraser</label>
            </form>
            <button id="clear-button">Clear</button>
        </div>
    </header>

    <main>
        <div class="canvas">
            <div class="container"></div>
        </div>
    </main>

    <footer>
        <p>&copy Jamie Fleming 2026</p>
    </footer>
    
</body>
</html>
